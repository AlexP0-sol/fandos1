# Docker Compose для развёртывания fundarbitrage на одной машине (раздел 20).
# Секреты передаются ТОЛЬКО через переменные окружения; жёстко заданных значений нет.
# Скопируйте .env.example → .env и заполните реальными значениями перед запуском.
#
# Запуск: docker compose up -d
# Остановка: docker compose down
# Логи worker: docker compose logs -f worker

services:

  # ============================================================
  # PostgreSQL — основная база данных
  # ============================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fundarbitrage}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-fundarbitrage}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # Migrate — однократное применение SQL-миграций
  # ============================================================
  migrate:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../fandos1/migrations:/migrations:ro
    # Применяем все *.sql файлы в порядке нумерации.
    command: >
      sh -c "
        for f in /migrations/*.sql; do
          echo \"Applying $$f...\";
          psql \"$$DATABASE_URL\" -f \"$$f\" || exit 1;
        done;
        echo 'Migrations complete.'
      "

  # ============================================================
  # Worker — основной торговый процесс (фоновые стратегии, outbox)
  # ============================================================
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUN_MODE: ${RUN_MODE:-dry_run}
      MASTER_KEY_B64: ${MASTER_KEY_B64}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: ${WORKER_HTTP_ADDR:-:9091}
      PROM_ADDR: ${PROM_ADDR:-:9090}
    # ENTRYPOINT в Dockerfile уже /usr/local/bin/worker

  # ============================================================
  # Server — HTTP API + Telegram Mini App
  # ============================================================
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUN_MODE: ${RUN_MODE:-dry_run}
      MASTER_KEY_B64: ${MASTER_KEY_B64}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    command: ["/usr/local/bin/server"]
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  postgres_data:
